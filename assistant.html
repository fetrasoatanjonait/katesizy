<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Mobile</title>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; }
        body { 
            font-family: sans-serif; background: var(--bg); color: white; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            transition: background 0.3s;
        }
        .card { background: #1e293b; padding: 20px; border-radius: 25px; text-align: center; width: 85%; }
        .btn { 
            background: var(--p); border: none; width: 100px; height: 100px; 
            border-radius: 50%; font-size: 40px; color: white; cursor: pointer;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        .listening { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #status { margin-top: 20px; color: #94a3b8; }
        video, audio { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <button id="mic" class="btn">🎙️</button>
        <p id="status">Appuyez et dites "Lampe", "Musique" ou "Vidéo"</p>
    </div>

    <!-- Lecteurs cachés -->
    <audio id="playerAudio" src="votre-musique.mp3"></audio>
    <video id="playerVideo" width="300" controls>
        <source src="votre-video.mp4" type="video/mp4">
    </video>

    <script>
        const mic = document.getElementById('mic');
        const status = document.getElementById('status');
        const audio = document.getElementById('playerAudio');
        const video = document.getElementById('playerVideo');

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'fr-FR';

            mic.onclick = () => rec.start();

            rec.onstart = () => {
                mic.classList.add('listening');
                status.innerText = "Je vous écoute...";
            };

            rec.onresult = (e) => {
                mic.classList.remove('listening');
                const cmd = e.results[0][0].transcript.toLowerCase();
                status.innerText = `Vous : ${cmd}`;
                executer(cmd);
            };
        }

        function executer(cmd) {
            const synth = window.speechSynthesis;
            let rep = "Je ne peux pas faire ça.";

            // 1. LAMPE (Simulation par écran)
            if (cmd.includes('lampe') || cmd.includes('lumière')) {
                document.body.style.background = "white";
                rep = "J'allume la lumière de l'écran.";
            } 
            
            // 2. MUSIQUE
            else if (cmd.includes('musique') || cmd.includes('joue')) {
                audio.play();
                rep = "Je lance la musique.";
            }
            else if (cmd.includes('stop')) {
                audio.pause();
                video.pause();
                document.body.style.background = "#0f172a";
                rep = "J'ai tout arrêté.";
            }

            // 3. VIDÉO
            else if (cmd.includes('vidéo')) {
                video.style.display = "block";
                video.play();
                rep = "Voici la vidéo.";
            }

            const talk = new SpeechSynthesisUtterance(rep);
            talk.lang = 'fr-FR';
            synth.speak(talk);
        }
    </script>
</body>
</html>
