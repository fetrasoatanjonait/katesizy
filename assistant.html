<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Assistant Vocal</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 2rem; }

        /* Animation du micro */
        .mic-btn {
            background: var(--primary);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 2rem;
            color: white;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .mic-btn:active { transform: scale(0.9); }

        .listening {
            animation: pulse 1.5s infinite;
            background: #ef4444;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status {
            margin-top: 1.5rem;
            min-height: 50px;
        }

        #transcript { color: #94a3b8; font-style: italic; }
        #response { color: #818cf8; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Assistant Vocal</h1>
        
        <button id="start-btn" class="mic-btn">🎙️</button>
        
        <div class="status">
            <p id="transcript">Cliquez pour parler...</p>
            <p id="response"></p>
        </div>
    </div>

    <script>
        const btn = document.querySelector('#start-btn');
        const transcriptDisplay = document.querySelector('#transcript');
        const responseDisplay = document.querySelector('#response');

        // Initialisation de la reconnaissance vocale
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            transcriptDisplay.innerText = "Désolé, votre navigateur ne supporte pas la voix.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.interimResults = false;

            // Déclenchement au clic
            btn.addEventListener('click', () => {
                recognition.start();
            });

            // Quand l'assistant commence à écouter
            recognition.onstart = () => {
                btn.classList.add('listening');
                transcriptDisplay.innerText = "J'écoute...";
                responseDisplay.innerText = "";
            };

            // Quand l'assistant a fini d'écouter
            recognition.onresult = (event) => {
                btn.classList.remove('listening');
                const message = event.results[0][0].transcript;
                transcriptDisplay.innerText = `Vous : "${message}"`;
                traiterMessage(message.toLowerCase());
            };

            recognition.onerror = () => {
                btn.classList.remove('listening');
                transcriptDisplay.innerText = "Erreur de micro. Réessayez.";
            };
        }

        // Logique de réponse
        function traiterMessage(msg) {
            let reponse = "Je n'ai pas compris votre demande.";

            if (msg.includes('bonjour') || msg.includes('salut')) {
                reponse = "Bonjour ! Comment puis-je vous aider aujourd'hui ?";
            } 
            else if (msg.includes('heure')) {
                const temps = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
                reponse = `Il est exactement ${temps}.`;
            } 
            else if (msg.includes('ton nom')) {
                reponse = "Je suis votre assistant vocal créé en HTML, CSS et JS.";
            }
            else if (msg.includes('météo')) {
                reponse = "Je ne suis pas encore connecté à une API météo, mais il semble faire beau dans votre code !";
            }
            else if (msg.includes('ouvre google')) {
                reponse = "C'est parti, j'ouvre Google pour vous.";
                window.open('https://www.google.com', '_blank');
            }

            parler(reponse);
        }

        // Synthèse vocale (L'assistant parle)
        function parler(texte) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang = 'fr-FR';
            
            responseDisplay.innerText = texte;
            synth.speak(utterance);
        }
    </script>
</body>
</html>
