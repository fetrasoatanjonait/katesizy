<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Administration CRUD - EKAR Antsobolo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #5B0E2D;
            --primary-dark: #420820;
            --accent-color: #C5A059;
            --accent-dark: #AB8540;
            --bg-light: #fdfbf7;
            --text-main: #333;
            --shadow-sm: 0 4px 15px rgba(91, 14, 45, 0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
            --radius-md: 12px;
            --radius-pill: 20px;
            --transition-base: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-light);
            color: var(--text-main);
        }

        .admin-header {
            background: var(--primary-color);
            color: white;
            padding: 20px 0;
            box-shadow: var(--shadow-md);
        }

        .admin-brand {
            color: var(--accent-color) !important;
            font-weight: bold;
            font-size: 24px;
            transition: var(--transition-base);
        }

        .admin-brand:hover {
            color: white !important;
        }

        .card {
            border: none;
            box-shadow: var(--shadow-sm);
            border-radius: var(--radius-md);
        }

        .nav-pills .nav-link {
            color: var(--primary-color);
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: var(--transition-base);
        }

        .nav-pills .nav-link.active,
        .nav-pills .nav-link:hover {
            background-color: var(--primary-color) !important;
            color: white !important;
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            transition: var(--transition-base);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .btn-warning {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            transition: var(--transition-base);
        }

        .btn-warning:hover {
            background-color: var(--accent-dark);
            border-color: var(--accent-dark);
            color: white;
        }

        .table-primary {
            --bs-table-bg: var(--primary-color);
            --bs-table-color: white;
        }

        .status-indicator {
            font-size: 14px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: var(--radius-pill);
        }

        /* Validation styles */
        .is-invalid {
            border-color: #dc3545 !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' width='12' height='12' fill='none' stroke='%23dc3545'%3e%3ccircle cx='6' cy='6' r='4.5'/%3e%3cpath stroke-linejoin='round' d='M5.8 3.6h.4L6 6.5zM6 8.2a.3.3 0 00-.3.3v.2c0 .17.13.3.3.3h.2a.3.3 0 00.3-.3v-.2a.3.3 0 00-.3-.3H6z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
        }

        .is-valid {
            border-color: #198754 !important;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3e%3cpath fill='%23198754' d='M2.3 6.73L.6 4.53c-.4-1.04.46-1.4 1.1-.8l1.1 1.4 3.4-3.8c.6-.63 1.6-.27 1.2.7l-4 4.6c-.43.5-.8.4-1.1.1z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right calc(0.375em + 0.1875rem) center;
            background-size: calc(0.75em + 0.375rem) calc(0.75em + 0.375rem);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .admin-header {
                padding: 15px 0;
            }

            .admin-brand {
                font-size: 18px;
            }

            .status-indicator {
                font-size: 12px;
                padding: 4px 12px;
            }

            .card {
                border-radius: 8px;
            }

            .btn {
                font-size: 14px;
                padding: 8px 16px;
            }

            .table-responsive {
                font-size: 14px;
            }

            .modal-dialog {
                margin: 10px;
            }

            .nav-pills .nav-link {
                font-size: 14px;
                padding: 10px 15px;
            }
        }

        @media (max-width: 576px) {
            .admin-header .container {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .admin-brand {
                font-size: 16px;
            }

            .status-indicator {
                font-size: 11px;
                padding: 4px 10px;
            }

            .btn-sm {
                font-size: 12px;
                padding: 4px 8px;
            }

            .table {
                font-size: 12px;
            }

            .modal-body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <header class="admin-header mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="admin-brand text-decoration-none" href="#"><i class="fa fa-user-shield me-2"></i> Dashboard avec Upload GitHub</a>
            <div id="statusBadge" class="status-indicator bg-warning text-dark"><i class="fa fa-sync fa-spin me-2"></i>Connexion...</div>
        </div>
    </header>

    <div class="container">
        <div class="row">
            <!-- MENU DE SÉLECTION DE SECTION -->
            <div class="col-md-3 mb-4">
                <div class="card p-3">
                    <h5 class="p-2 text-muted small text-uppercase font-weight-bold">Menus du site</h5>
                    <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                        <button class="nav-link active text-start" data-bs-toggle="pill" onclick="changerSection('bureau')"><i class="fa fa-users me-2"></i> Bureau</button>
                        <button class="nav-link text-start" data-bs-toggle="pill" onclick="changerSection('enseignants')"><i class="fa fa-chalkboard-teacher me-2"></i> Enseignants</button>
                        <button class="nav-link text-start" data-bs-toggle="pill" onclick="changerSection('evenements')"><i class="fa fa-calendar-alt me-2"></i> Événements</button>
                        <button class="nav-link text-start" data-bs-toggle="pill" onclick="changerSection('sacrements')"><i class="fa fa-church me-2"></i> Sacrements</button>
                        <button class="nav-link text-start" data-bs-toggle="pill" onclick="changerSection('actualites')"><i class="fa fa-newspaper me-2"></i> Actualités</button>
                        <button class="nav-link text-start" data-bs-toggle="pill" onclick="changerSection('dons')"><i class="fa fa-hand-holding-usd me-2"></i> Dons reçus</button>
                    </div>
                </div>
            </div>

            <!-- PANNEAU D'AFFICHAGE ET CRUD -->
            <div class="col-md-9">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 id="sectionTitle" class="mb-0" style="color: #5B0E2D; font-weight: bold;">Gestion du Bureau</h3>
                        <button class="btn btn-primary" onclick="ouvrirModalAjout()" aria-label="Ajouter un nouvel élément"><i class="fa fa-plus me-2"></i>Ajouter un élément</button>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle" aria-live="polite" aria-label="Tableau des données">
                            <thead class="table-primary">
                                <tr id="tableHeader"></tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTAINER TOAST POUR NOTIFICATIONS -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header" id="toastHeader">
                <strong class="me-auto" id="toastTitle">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- MODAL UNIQUE DU FORMULAIRE DYNAMIQUE (AJOUT / MODIFICATION) -->
    <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <form id="dynamicForm" onsubmit="soumettreFormulaire(event)">
                <div class="modal-content">
                    <div class="modal-header" style="background: #5B0E2D; color: white;">
                        <h5 class="modal-title" id="modalTitle">Formulaire</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="modalFormFields"></div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                        <button type="submit" class="btn btn-primary" id="btnSave"><i class="fa fa-save me-2"></i>Enregistrer et Publier</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const config = {
            token: "ghp_" + "mSQCh8UYW5v7ggHV1ZDo62NSstG0Qd4XorDM",
            repo: "fetrasoatanjonait/katesizy"
        };

        let sectionActuelle = "bureau";
        let donneesActuelles = [];
        let shaActuel = "";
        let indexEnEdition = null;

        // Liste globale des classes de catéchisme disponibles pour les menus déroulants
        const LISTE_CLASSES = [
            "Zaza mazoto",
            "KV I",
            "KV II",
            "KV III",
            "Integration"
        ];

        // Liste des catégories de sacrements
        const LISTE_CATEGORIES_SACREMENTS = [
            "Intégration",
            "Baptême",
            "Confession",
            "1ère Communion",
            "Renouvellement",
            "Confirmation",
            "Mariage"
        ];

        // Structure unifiée
        const modelesChiffres = {
            bureau: { 
                fields: { id: "id", nom: "text", fonction: "text", telephone: "text", photo: "file", color: "color" }, 
                headers: ["ID", "Nom", "Fonction", "Téléphone"] 
            },
            enseignants: { 
                fields: { id: "id", nom: "text", classe: "text", telephone: "text", email: "email", adresse: "text", photo: "file", profession: "text", service: "text", citation: "textarea" }, 
                headers: ["ID", "Nom", "Classe", "Téléphone"] 
            },
            evenements: { 
                fields: { id: "id", titre: "text", date: "text", description: "textarea", photos: "files" }, 
                headers: ["ID", "Titre", "Date"] 
            },
            sacrements: {
                fields: { id: "id", nom: "text", categorie: "select", date: "text", description: "textarea", photos: "files" },
                headers: ["ID", "Nom", "Catégorie", "Période"]
            },
            actualites: { 
                fields: { id: "id", date: "text", titre: "text", description: "textarea", classe: "text" }, 
                headers: ["ID", "Date", "Titre", "Classe"] 
            },
            dons: { 
                fields: { id: "id", date: "text", nom: "text", montant: "number", message: "text" }, 
                headers: ["ID", "Date", "Donateur", "Montant"] 
            }
        };

        // Fonction pour afficher les notifications toast
        function afficherToast(titre, message, type = 'success') {
            const toastElement = document.getElementById('liveToast');
            const toastHeader = document.getElementById('toastHeader');
            const toastTitle = document.getElementById('toastTitle');
            const toastBody = document.getElementById('toastBody');

            toastTitle.textContent = titre;
            toastBody.textContent = message;

            // Style selon le type
            toastHeader.className = 'toast-header';
            if (type === 'success') {
                toastHeader.classList.add('bg-success', 'text-white');
            } else if (type === 'error') {
                toastHeader.classList.add('bg-danger', 'text-white');
            } else if (type === 'warning') {
                toastHeader.classList.add('bg-warning', 'text-dark');
            }

            const toast = new bootstrap.Toast(toastElement);
            toast.show();
        }

        window.onload = function() {
            verifierConfiguration();
            changerSection('bureau');
        };

        function verifierConfiguration() {
            const statusBadge = document.getElementById('statusBadge');
            if(!config.token || config.token.includes("VOTRE_TOKEN")) {
                statusBadge.className = "status-indicator bg-danger text-white";
                statusBadge.innerHTML = `<i class="fa fa-exclamation-triangle me-2"></i> Configuration manquante`;
            } else {
                statusBadge.className = "status-indicator bg-success text-white";
                statusBadge.innerHTML = `<i class="fa fa-check-circle me-2"></i> Connecté au dépôt`;
            }
        }

        async function changerSection(nomSection) {
            sectionActuelle = nomSection;
            document.getElementById('sectionTitle').innerText = "Gestion : " + nomSection.toUpperCase();
            await chargerDonneesSection();
        }

        async function chargerDonneesSection() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4"><i class="fa fa-sync fa-spin me-2"></i>Récupération depuis GitHub...</td></tr>`;

            const url = `https://api.github.com/repos/${config.repo}/contents/${sectionActuelle}.json`;
            try {
                // Pas d'en-tête Cache-Control pour éviter le blocage CORS
                const res = await fetch(url, {
                    headers: { Authorization: `token ${config.token}` }
                });
                
                if(res.ok) {
                    const data = await res.json();
                    shaActuel = data.sha;
                    donneesActuelles = JSON.parse(atob(data.content.replace(/\s/g, '')));
                    
                    // Normalisation automatique numérique des identifiants uniques
                    donneesActuelles = donneesActuelles.map((item, idx) => {
                        if (item.id === undefined || item.id === null || isNaN(item.id)) {
                            item.id = idx + 1;
                        } else {
                            item.id = Number(item.id);
                        }
                        return item;
                    });
                    
                    genererTableau();
                } else if (res.status === 404) {
                    donneesActuelles = [];
                    shaActuel = "";
                    genererTableau();
                } else {
                    throw new Error(`Réponse HTTP instable : ${res.status}`);
                }
            } catch (err) {
                console.error(err);
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-4"><i class="fa fa-times me-2"></i>Erreur lors du chargement (Problème Token ou Réseau).</td></tr>`;
                afficherToast('Erreur', 'Erreur lors du chargement des données. Vérifiez votre connexion et le token.', 'error');
            }
        }

        function genererTableau() {
            const modele = modelesChiffres[sectionActuelle];
            let headersHtml = modele.headers.map(h => `<th>${h}</th>`).join('');
            headersHtml += `<th class="text-end">Actions</th>`;
            document.getElementById('tableHeader').innerHTML = headersHtml;

            const tbody = document.getElementById('tableBody');
            if(donneesActuelles.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${modele.headers.length + 1}" class="text-center text-muted py-4">Aucune donnée trouvée. Cliquez sur "Ajouter".</td></tr>`;
                return;
            }

            tbody.innerHTML = donneesActuelles.map((item, index) => {
                const keys = Object.keys(modele.fields);
                let rowCells = "";
                for(let i=0; i < modele.headers.length; i++) {
                    let val = item[keys[i]] !== undefined ? item[keys[i]] : '';
                    if(keys[i] === 'montant') val = Number(val).toLocaleString() + " Ar";
                    rowCells += `<td>${val}</td>`;
                }
                return `
                    <tr>
                        ${rowCells}
                        <td class="text-end">
                            <button class="btn btn-sm btn-warning me-1" onclick="ouvrirModalEdition(${index})" aria-label="Modifier l'élément ${item.id}"><i class="fa fa-edit me-1"></i>Modifier</button>
                            <button class="btn btn-sm btn-danger" onclick="supprimerItem(${index})" aria-label="Supprimer l'élément ${item.id}"><i class="fa fa-trash me-1"></i>Supprimer</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function genererChampsFormulaire(itemData = null) {
            const fields = modelesChiffres[sectionActuelle].fields;
            let html = "";

            for (const [key, type] of Object.entries(fields)) {
                let val = itemData ? (itemData[key] !== undefined ? itemData[key] : '') : '';

                // Gestion automatisée de l'identifiant numérique séquentiel
                if (type === 'id') {
                    if (!itemData) {
                        const maxId = donneesActuelles.reduce((max, obj) => Number(obj.id) > max ? Number(obj.id) : max, 0);
                        val = maxId + 1;
                    }
                    html += `<div class="mb-3 bg-light p-2 border rounded">
                        <label class="form-label text-uppercase fw-bold text-muted small mb-0">ID Unique (Généré automatiquement)</label>
                        <input type="hidden" name="id" value="${val}">
                        <div class="h5 mb-0 fw-bold text-secondary"># ${val}</div>
                    </div>`;
                    continue;
                }

                html += `<div class="mb-3">
                    <label class="form-label text-capitalize fw-bold small" for="field_${key}">${key}</label>`;
                
                // Interception du champ 'classe' pour générer une liste déroulante ordonnée
                if (key === 'classe') {
                    html += `<select class="form-select" name="classe" id="field_${key}" required aria-required="true">`;
                    html += `<option value="" disabled ${!val ? 'selected' : ''}>-- Sélectionnez une classe --</option>`;
                    LISTE_CLASSES.forEach(classe => {
                        const selected = val === classe ? 'selected' : '';
                        html += `<option value="${classe}" ${selected}>${classe}</option>`;
                    });
                    html += `</select>`;
                }
                // Interception du champ 'categorie' pour générer une liste déroulante des sacrements
                else if (key === 'categorie') {
                    html += `<select class="form-select" name="categorie" id="field_${key}" required aria-required="true">`;
                    html += `<option value="" disabled ${!val ? 'selected' : ''}>-- Sélectionnez une catégorie --</option>`;
                    LISTE_CATEGORIES_SACREMENTS.forEach(categorie => {
                        const selected = val === categorie ? 'selected' : '';
                        html += `<option value="${categorie}" ${selected}>${categorie}</option>`;
                    });
                    html += `</select>`;
                }
                else if(type === 'textarea') {
                    html += `<textarea class="form-control" name="${key}" id="field_${key}" rows="3" required aria-required="true">${val}</textarea>`;
                } else if(type === 'file') {
                    html += `<input type="file" class="form-control" name="${key}" id="field_${key}" accept="image/*" ${!itemData ? 'required' : ''} aria-describedby="fileHelp_${key}">`;
                    if(val) {
                        html += `<div class="form-text text-truncate text-muted mt-1" id="fileHelp_${key}">Image actuelle : <a href="${val}" target="_blank" class="small text-decoration-none text-primary fw-bold">${val.split('/').pop()}</a></div>`;
                        html += `<input type="hidden" name="existing_${key}" value="${val}">`;
                    }
                } else if(type === 'files') {
                    html += `<input type="file" class="form-control" name="${key}" id="field_${key}" accept="image/*" multiple ${!itemData ? 'required' : ''} aria-describedby="fileHelp_${key}">`;
                    html += `<div class="form-text text-muted mt-1" id="fileHelp_${key}">Vous pouvez sélectionner plusieurs images pour former un album.</div>`;
                    if(val) {
                        const existingPhotos = Array.isArray(val) ? val : [val];
                        html += `<div class="mt-2">`;
                        html += `<div class="small text-muted mb-1">Images actuelles :</div>`;
                        existingPhotos.forEach((photo, idx) => {
                            html += `<div class="mb-1"><a href="${photo}" target="_blank" class="small text-decoration-none text-primary fw-bold">${photo.split('/').pop()}</a></div>`;
                        });
                        html += `<input type="hidden" name="existing_${key}" value='${JSON.stringify(existingPhotos)}'>`;
                        html += `</div>`;
                    }
                } else if(type === 'color') {
                    const validColor = val && val.startsWith('#') ? val : '#5B0E2D';
                    html += `<input type="color" class="form-control form-control-color w-100" name="${key}" id="field_${key}" value="${validColor}" aria-label="Sélectionner une couleur">`;
                } else {
                    html += `<input type="${type}" class="form-control" name="${key}" id="field_${key}" value="${val}" ${type === 'number' ? 'required' : ''} required aria-required="true">`;
                }
                html += `</div>`;
            }
            document.getElementById('modalFormFields').innerHTML = html;
        }

        function ouvrirModalAjout() {
            indexEnEdition = null;
            document.getElementById('modalTitle').innerText = `Ajouter un élément - ${sectionActuelle.toUpperCase()}`;
            genererChampsFormulaire();
            new bootstrap.Modal(document.getElementById('formModal')).show();
        }

        function ouvrirModalEdition(index) {
            indexEnEdition = index;
            document.getElementById('modalTitle').innerText = `Modifier l'élément #${donneesActuelles[index].id} - ${sectionActuelle.toUpperCase()}`;
            genererChampsFormulaire(donneesActuelles[index]);
            new bootstrap.Modal(document.getElementById('formModal')).show();
        }

        function convertirEnBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function uploaderImageVersGit(nomFichier, base64Content) {
            const cleanName = Date.now() + "_" + nomFichier.replace(/\s+/g, '_');
            const url = `https://api.github.com/repos/${config.repo}/contents/images/${cleanName}`;
            
            const body = {
                message: `Upload image: ${cleanName} via admin dashboard`,
                content: base64Content
            };

            const res = await fetch(url, {
                method: "PUT",
                headers: { Authorization: `token ${config.token}`, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });

            if(res.ok) {
                return `https://raw.githubusercontent.com/${config.repo}/main/images/${cleanName}`;
            } else {
                throw new Error("Échec du téléversement de la photo sur GitHub.");
            }
        }

        async function soumettreFormulaire(e) {
            e.preventDefault();
            const formElement = document.getElementById('dynamicForm');

            // Validation manuelle des champs
            const formData = new FormData(formElement);
            const fields = modelesChiffres[sectionActuelle].fields;

            // Validation des champs requis
            for (const [key, type] of Object.entries(fields)) {
                if (type === 'id') continue; // ID est auto-généré

                const value = formData.get(key);
                const fieldElement = formElement.querySelector(`[name="${key}"]`);

                // Validation champ vide (pour les champs texte/textarea/email)
                if (type !== 'file' && type !== 'files' && type !== 'color') {
                    if (!value || (typeof value === 'string' && value.trim() === '')) {
                        afficherToast('Erreur', `Le champ "${key}" est obligatoire.`, 'error');
                        if (fieldElement) {
                            fieldElement.classList.add('is-invalid');
                            fieldElement.focus();
                        }
                        return;
                    }
                }

                // Validation file (requis uniquement si pas en mode édition)
                if (type === 'file' && indexEnEdition === null) {
                    const fileInput = formElement.querySelector(`input[name="${key}"]`);
                    if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                        afficherToast('Erreur', `Veuillez sélectionner une image pour le champ "${key}".`, 'error');
                        if (fieldElement) {
                            fieldElement.classList.add('is-invalid');
                            fieldElement.focus();
                        }
                        return;
                    }
                }

                // Validation files (requis uniquement si pas en mode édition)
                if (type === 'files' && indexEnEdition === null) {
                    const fileInput = formElement.querySelector(`input[name="${key}"]`);
                    if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                        afficherToast('Erreur', `Veuillez sélectionner au moins une image pour le champ "${key}".`, 'error');
                        if (fieldElement) {
                            fieldElement.classList.add('is-invalid');
                            fieldElement.focus();
                        }
                        return;
                    }
                }

                // Validation email
                if (type === 'email' && value && typeof value === 'string') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(value)) {
                        afficherToast('Erreur', 'Veuillez entrer une adresse email valide.', 'error');
                        if (fieldElement) {
                            fieldElement.classList.add('is-invalid');
                            fieldElement.focus();
                        }
                        return;
                    }
                }

                // Validation téléphone (format malgache ou international)
                if (key === 'telephone' && value && typeof value === 'string') {
                    const phoneRegex = /^[\+]?[(]?[0-9]{3}[)]?[-\s\.]?[0-9]{3}[-\s\.]?[0-9]{4,6}$/;
                    if (!phoneRegex.test(value.replace(/\s/g, ''))) {
                        afficherToast('Erreur', 'Veuillez entrer un numéro de téléphone valide.', 'error');
                        if (fieldElement) {
                            fieldElement.classList.add('is-invalid');
                            fieldElement.focus();
                        }
                        return;
                    }
                }

                // Validation montant positif
                if (type === 'number' && key === 'montant' && value) {
                    const numValue = Number(value);
                    if (numValue <= 0) {
                        afficherToast('Erreur', 'Le montant doit être supérieur à 0.', 'error');
                        if (fieldElement) {
                            fieldElement.classList.add('is-invalid');
                            fieldElement.focus();
                        }
                        return;
                    }
                }

                // Nettoyage des classes de validation
                if (fieldElement) {
                    fieldElement.classList.remove('is-invalid');
                    fieldElement.classList.add('is-valid');
                }
            }

            const saveBtn = document.getElementById('btnSave');
            saveBtn.disabled = true;
            saveBtn.innerHTML = `<i class="fa fa-spinner fa-spin me-2"></i>Téléversement & Publication...`;

            let nouvelItem = {};

            try {
                for (const [key, type] of Object.entries(fields)) {
                    if (type === 'id') {
                        nouvelItem[key] = Number(formData.get('id'));
                    } else if (type === 'file') {
                        const fileInput = formElement.querySelector(`input[name="${key}"]`);
                        if (fileInput && fileInput.files.length > 0) {
                            const file = fileInput.files[0];
                            const base64 = await convertirEnBase64(file);
                            nouvelItem[key] = await uploaderImageVersGit(file.name, base64);
                        } else {
                            nouvelItem[key] = formData.get(`existing_${key}`) || '';
                        }
                    } else if (type === 'files') {
                        const fileInput = formElement.querySelector(`input[name="${key}"]`);
                        if (fileInput && fileInput.files.length > 0) {
                            const uploadedUrls = [];
                            for (let i = 0; i < fileInput.files.length; i++) {
                                const file = fileInput.files[i];
                                const base64 = await convertirEnBase64(file);
                                const url = await uploaderImageVersGit(file.name, base64);
                                uploadedUrls.push(url);
                            }
                            nouvelItem[key] = uploadedUrls;
                        } else {
                            const existingValue = formData.get(`existing_${key}`);
                            nouvelItem[key] = existingValue ? JSON.parse(existingValue) : [];
                        }
                    } else {
                        let val = formData.get(key);
                        if(type === 'number') val = Number(val);
                        nouvelItem[key] = val;
                    }
                }

                if(indexEnEdition !== null) {
                    donneesActuelles[indexEnEdition] = nouvelItem;
                } else {
                    donneesActuelles.push(nouvelItem);
                }

                await pousserFichierJsonVersGitHub(`Mise à jour (${sectionActuelle}) via Dashboard`);
                bootstrap.Modal.getInstance(document.getElementById('formModal'))?.hide();
                await chargerDonneesSection();

            } catch (err) {
                afficherToast('Erreur', "Erreur lors de l'enregistrement : " + err.message, 'error');
                console.error(err);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `<i class="fa fa-save me-2"></i>Enregistrer et Publier`;
            }
        }

        async function supprimerItem(index) {
            if(confirm("Êtes-vous certain de vouloir supprimer définitivement cet élément ?")) {
                donneesActuelles.splice(index, 1);
                try {
                    await pousserFichierJsonVersGitHub(`Suppression d'un élément dans ${sectionActuelle}`);
                    await chargerDonneesSection();
                } catch (err) {
                    afficherToast('Erreur', "Erreur lors de la suppression : " + err.message, 'error');
                }
            }
        }

        async function pousserFichierJsonVersGitHub(messageCommit) {
            const url = `https://api.github.com/repos/${config.repo}/contents/${sectionActuelle}.json`;
            const corpsRequete = {
                message: messageCommit,
                content: btoa(unescape(encodeURIComponent(JSON.stringify(donneesActuelles, null, 2)))),
                sha: shaActuel
            };

            const res = await fetch(url, {
                method: "PUT",
                headers: { Authorization: `token ${config.token}`, "Content-Type": "application/json" },
                body: JSON.stringify(corpsRequete)
            });

            if(res.ok) {
                afficherToast('Succès', 'Données appliquées et publiées sur GitHub avec succès !', 'success');
            } else {
                const errData = await res.json();
                throw new Error(errData.message);
            }
        }
    </script>
</body>
</html>
